name: Docker Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # tipos por defecto (opened, synchronize, reopened): valida el PR ANTES del merge

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Pull Docker image
        run: docker pull leonfullxr/ecc-benchmarks:latest

      - name: Build + smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            leonfullxr/ecc-benchmarks:latest \
            sh -c "mkdir -p bin && make && ./bin/bench -h"

      - name: Reproducibility check (fixed seed)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            leonfullxr/ecc-benchmarks:latest \
            bash scripts/test_reproducibility.sh