# Lint - analisis estatico de C++, scripts y Python
# Leon Elliott Fuller - 2026-06-02

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed C/C++ files
        id: changed-cpp
        shell: bash
        run: |
          set -euo pipefail
          zero_sha='0000000000000000000000000000000000000000'

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
          fi

          if [ "$base_sha" != "$zero_sha" ] && git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            mapfile -t files < <(
              git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" \
                | grep -E '^(src|include)/.+\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$' || true
            )
          else
            mapfile -t files < <(
              git diff-tree --no-commit-id --name-only --diff-filter=ACMR -r "$head_sha" \
                | grep -E '^(src|include)/.+\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$' || true
            )
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Changed C/C++ files:\n'
          printf '%s\n' "${files[@]}"
          changed_files="$(printf '%s\n' "${files[@]}")"
          include_regex="$(
            CHANGED_FILES="$changed_files" python3 - <<'PY'
          import os
          import re

          files = [line for line in os.environ["CHANGED_FILES"].splitlines() if line]
          print(r"^\./(" + "|".join(re.escape(path) for path in files) + r")$")
          PY
          )"
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "include_regex=$include_regex" >> "$GITHUB_OUTPUT"
      # Si aun no has normalizado el codigo, esto marcara muchos ficheros.
      # Ejecuta una vez "clang-format -i <ficheros>" en local antes de exigirlo.
      - name: Check changed C++ formatting
        if: steps.changed-cpp.outputs.has_files == 'true'
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: '17'
          include-regex: ${{ steps.changed-cpp.outputs.include_regex }}
      - name: Skip clang-format (no changed C/C++ files)
        if: steps.changed-cpp.outputs.has_files != 'true'
        run: echo "No changed C/C++ files to check."

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck (informativo)
        # error-exitcode=0 -> no rompe el build. Cambia a 1 para exigirlo.
        run: |
          cppcheck --std=c++17 \
                   --enable=warning,performance,portability \
                   --inline-suppr --error-exitcode=0 \
                   --suppress=missingIncludeSystem \
                   . 2>&1 | tee cppcheck.log

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Lint Python scripts (informativo)
        run: |
          pip install ruff
          ruff check . || true